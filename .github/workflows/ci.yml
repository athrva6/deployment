name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build started for $GITHUB_SHA"
      - run: ls -la
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Testing"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying, only if test passed"
